name: Generate Pixel Art README Assets

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "generate_assets.js"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Assets
        run: node generate_assets.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/header.svg assets/projects.svg assets/stats.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update crystal castles pixel art SVGs" && git push)
