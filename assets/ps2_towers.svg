<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%">
  <!-- Pure Black Background -->
  <rect width="100%" height="100%" fill="#000000"/>
  
  <defs>
    <!-- Cyan Glow and Glass Gradients for PS2 Towers -->
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00a8ff" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00b0ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00182b" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d8ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000e1a" stop-opacity="0.05"/>
    </linearGradient>
    
    <!-- Amethyst/Purple Accent Gradients -->
    <linearGradient id="topPurpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc55ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#8800ff" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="leftPurpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#aa44ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1d003b" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="rightPurpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9900ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f0021" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Grid Line Gradient -->
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#002b47" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#002b47" stop-opacity="0.1"/>
    </linearGradient>

    <radialGradient id="baseGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0088cc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ambient light glow at the base -->
  <ellipse cx="400" cy="220" rx="320" ry="70" fill="url(#baseGlow)"/>

  <!-- Isometric Grid Lines -->
  <g stroke="url(#gridGrad)" stroke-width="1.5" fill="none">
    <!-- Back to front perspective grid -->
    <path d="M 50,220 L 750,220" />
    <path d="M 120,180 L 680,260" />
    <path d="M 120,260 L 680,180" />
    <path d="M 220,150 L 580,290" />
    <path d="M 220,290 L 580,150" />
  </g>

  <!-- Isometric 3D Columns (PS2 Save Towers) -->
  <!-- Render order: Back rows first, then middle, then front to handle overlaps correctly -->
  
  <!-- Row 1: Back (Y = 160) -->
  <g transform="translate(240, 160)">
    <!-- Tower 1: Small Cyan -->
    <polygon points="-12,-6 0,0 0,50 -12,44" fill="url(#leftGrad)"/>
    <polygon points="0,0 12,-6 12,44 0,50" fill="url(#rightGrad)"/>
    <polygon points="-12,-6 0,-12 12,-6 0,0" fill="url(#topGrad)"/>
  </g>
  <g transform="translate(400, 150)">
    <!-- Tower 2: Tall Purple -->
    <polygon points="-12,-6 0,0 0,110 -12,104" fill="url(#leftPurpleGrad)"/>
    <polygon points="0,0 12,-6 12,104 0,110" fill="url(#rightPurpleGrad)"/>
    <polygon points="-12,-6 0,-12 12,-6 0,0" fill="url(#topPurpleGrad)"/>
  </g>
  <g transform="translate(560, 165)">
    <!-- Tower 3: Medium Cyan -->
    <polygon points="-12,-6 0,0 0,70 -12,64" fill="url(#leftGrad)"/>
    <polygon points="0,0 12,-6 12,64 0,70" fill="url(#rightGrad)"/>
    <polygon points="-12,-6 0,-12 12,-6 0,0" fill="url(#topGrad)"/>
  </g>

  <!-- Row 2: Mid-Back (Y = 190) -->
  <g transform="translate(180, 190)">
    <!-- Tower 4: Medium Purple -->
    <polygon points="-14,-7 0,0 0,85 -14,78" fill="url(#leftPurpleGrad)"/>
    <polygon points="0,0 14,-7 14,78 0,85" fill="url(#rightPurpleGrad)"/>
    <polygon points="-14,-7 0,-14 14,-7 0,0" fill="url(#topPurpleGrad)"/>
  </g>
  <g transform="translate(320, 185)">
    <!-- Tower 5: Very Tall Cyan -->
    <polygon points="-16,-8 0,0 0,140 -16,132" fill="url(#leftGrad)"/>
    <polygon points="0,0 16,-8 16,132 0,140" fill="url(#rightGrad)"/>
    <polygon points="-16,-8 0,-16 16,-8 0,0" fill="url(#topGrad)"/>
  </g>
  <g transform="translate(480, 190)">
    <!-- Tower 6: Tall Cyan -->
    <polygon points="-14,-7 0,0 0,120 -14,113" fill="url(#leftGrad)"/>
    <polygon points="0,0 14,-7 14,113 0,120" fill="url(#rightGrad)"/>
    <polygon points="-14,-7 0,-14 14,-7 0,0" fill="url(#topGrad)"/>
  </g>

  <!-- Row 3: Mid-Front (Y = 220) -->
  <g transform="translate(250, 220)">
    <!-- Tower 7: Giant Cyan -->
    <polygon points="-18,-9 0,0 0,165 -18,156" fill="url(#leftGrad)"/>
    <polygon points="0,0 18,-9 18,156 0,165" fill="url(#rightGrad)"/>
    <polygon points="-18,-9 0,-18 18,-9 0,0" fill="url(#topGrad)"/>
  </g>
  <g transform="translate(390, 225)">
    <!-- Tower 8: Medium Purple -->
    <polygon points="-16,-8 0,0 0,90 -16,82" fill="url(#leftPurpleGrad)"/>
    <polygon points="0,0 16,-8 16,82 0,90" fill="url(#rightPurpleGrad)"/>
    <polygon points="-16,-8 0,-16 16,-8 0,0" fill="url(#topPurpleGrad)"/>
  </g>
  <g transform="translate(530, 215)">
    <!-- Tower 9: Very Tall Purple -->
    <polygon points="-16,-8 0,0 0,135 -16,127" fill="url(#leftPurpleGrad)"/>
    <polygon points="0,0 16,-8 16,127 0,135" fill="url(#rightPurpleGrad)"/>
    <polygon points="-16,-8 0,-16 16,-8 0,0" fill="url(#topPurpleGrad)"/>
  </g>

  <!-- Row 4: Front (Y = 250) -->
  <g transform="translate(310, 255)">
    <!-- Tower 10: Medium Cyan -->
    <polygon points="-14,-7 0,0 0,80 -14,73" fill="url(#leftGrad)"/>
    <polygon points="0,0 14,-7 14,73 0,80" fill="url(#rightGrad)"/>
    <polygon points="-14,-7 0,-14 14,-7 0,0" fill="url(#topGrad)"/>
  </g>
  <g transform="translate(460, 250)">
    <!-- Tower 11: Tall Cyan -->
    <polygon points="-15,-8 0,0 0,115 -15,107" fill="url(#leftGrad)"/>
    <polygon points="0,0 15,-8 15,107 0,115" fill="url(#rightGrad)"/>
    <polygon points="-15,-8 0,-16 15,-8 0,0" fill="url(#topGrad)"/>
  </g>

  <!-- PS2 Menu Title style text -->
  <text x="50%" y="300" dominant-baseline="middle" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', monospace" font-weight="600" font-size="11" fill="#444" letter-spacing="6">
    PS2 MEMORY CARD SLOTS / SYSTEM ACTIVITY
  </text>
</svg>
