        <circle cx="10" cy="10" r="4" class="window-dot-red" />
        <circle cx="25" cy="10" r="4" class="window-dot-yellow" />
        <circle cx="40" cy="10" r="4" class="window-dot-green" />
        
        <text x="55" y="14" class="text-sub" fill="#050508">~/SkySweep32</text>
        
