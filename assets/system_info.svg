<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%">
  <!-- Console Style Info Panel -->
  <rect width="100%" height="100%" fill="#000000" rx="8" stroke="#111111" stroke-width="2" />
  
  <!-- Grid Background (Console Scanlines) -->
  <pattern id="scanlines" width="100" height="4" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#080808" stroke-width="1.5" />
  </pattern>
  <rect width="100%" height="100%" fill="url(#scanlines)" />

  <!-- Left: PS2 Memory Card Graphic -->
  <g transform="translate(30, 35)">
    <!-- Memory card outer shell -->
    <rect width="80" height="130" rx="6" fill="#0a0a0a" stroke="#222222" stroke-width="2"/>
    <!-- Top indentation -->
    <path d="M 8 0 L 72 0 L 62 18 L 18 18 Z" fill="#050505"/>
    <!-- Connection pins gap -->
    <rect x="12" y="118" width="56" height="12" rx="1" fill="#020202"/>
    <!-- Label area -->
    <rect x="10" y="30" width="60" height="55" rx="3" fill="#030303" stroke="#111" stroke-width="1"/>
    <!-- Text on label -->
    <text x="40" y="48" dominant-baseline="middle" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', monospace" font-size="8" fill="#00d4ff" font-weight="bold" letter-spacing="1">MEMORY CARD</text>
    <text x="40" y="65" dominant-baseline="middle" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', monospace" font-size="16" fill="#ffffff" font-weight="bold">8 MB</text>
    <!-- PlayStation Logo-style Text -->
    <text x="40" y="102" dominant-baseline="middle" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', monospace" font-size="6" fill="#555" letter-spacing="2">SLOT 1</text>
  </g>

  <!-- Right: PS3 Style System Information -->
  <g transform="translate(145, 30)" font-family="'Space Grotesk', 'Segoe UI', monospace" fill="#ffffff">
    <text x="0" y="20" font-size="16" font-weight="bold" fill="#00d4ff" letter-spacing="2">// SYSTEM INFORMATION</text>
    
    <text x="0" y="55" font-size="12" fill="#555555" letter-spacing="1">System Software:</text>
    <text x="140" y="55" font-size="12" font-weight="bold" fill="#ffffff">Vibecoder-OS v3.00</text>
    
    <text x="0" y="75" font-size="12" fill="#555555" letter-spacing="1">Host IP Address:</text>
    <text x="140" y="75" font-size="12" font-weight="bold" fill="#ffffff">192.168.1.37</text>
    
    <text x="0" y="95" font-size="12" fill="#555555" letter-spacing="1">Storage Capacity:</text>
    <text x="140" y="95" font-size="12" font-weight="bold" fill="#ffffff">8.00 MB / 128 KB Free</text>
    
    <text x="0" y="115" font-size="12" fill="#555555" letter-spacing="1">Target MAC:</text>
    <text x="140" y="115" font-size="12" font-weight="bold" fill="#ffffff">DE:AD:BE:EF:C0:DE</text>

    <!-- Progress bar for storage (PS3 Style UI) -->
    <rect x="0" y="135" width="470" height="6" rx="3" fill="#0a0a0a" />
    <rect x="0" y="135" width="440" height="6" rx="3" fill="#00d4ff" />
  </g>
</svg>
