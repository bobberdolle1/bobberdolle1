<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 160" width="100%">
  <!-- Deep Dark Space Background -->
  <rect width="100%" height="100%" fill="#000000" />
  
  <defs>
    <!-- Cyan/Blue Wave Gradient -->
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001829" />
      <stop offset="35%" stop-color="#005f9e" />
      <stop offset="50%" stop-color="#00d4ff" />
      <stop offset="65%" stop-color="#005f9e" />
      <stop offset="100%" stop-color="#001829" />
    </linearGradient>
    
    <!-- Purple/Amethyst Wave Gradient -->
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#12001c" />
      <stop offset="35%" stop-color="#4c007a" />
      <stop offset="50%" stop-color="#9d00ff" />
      <stop offset="65%" stop-color="#4c007a" />
      <stop offset="100%" stop-color="#12001c" />
    </linearGradient>
    
    <!-- Ambient Dust Particles -->
    <radialGradient id="particle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Flowing XMB Wave 1 -->
  <path fill="none" stroke="url(#gradient1)" stroke-width="3" opacity="0.65">
    <animate attributeName="d" 
             dur="12s" 
             repeatCount="indefinite"
             values="
               M0,80 Q250,15 500,80 T1000,80;
               M0,80 Q250,145 500,80 T1000,80;
               M0,80 Q250,15 500,80 T1000,80
             " />
  </path>
  
  <!-- Flowing XMB Wave 2 (Slow & Deep) -->
  <path fill="none" stroke="url(#gradient2)" stroke-width="2" opacity="0.45">
    <animate attributeName="d" 
             dur="18s" 
             repeatCount="indefinite"
             values="
               M0,80 Q250,145 500,80 T1000,80;
               M0,80 Q250,15 500,80 T1000,80;
               M0,80 Q250,145 500,80 T1000,80
             " />
  </path>

  <!-- Flowing XMB Wave 3 (Thin Accent) -->
  <path fill="none" stroke="#ffffff" stroke-width="0.75" opacity="0.25">
    <animate attributeName="d" 
             dur="15s" 
             repeatCount="indefinite"
             values="
               M0,80 Q150,50 500,70 T1000,90;
               M0,80 Q150,110 500,90 T1000,70;
               M0,80 Q150,50 500,70 T1000,90
             " />
  </path>

  <!-- PS2 / PS3 Dust Particles (Ambient floating) -->
  <circle cx="200" cy="50" r="2" fill="url(#particle)">
    <animate attributeName="cy" dur="8s" repeatCount="indefinite" values="50;45;50" />
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0.2;0.8;0.2" />
  </circle>
  <circle cx="750" cy="110" r="1.5" fill="url(#particle)">
    <animate attributeName="cy" dur="11s" repeatCount="indefinite" values="110;115;110" />
    <animate attributeName="opacity" dur="11s" repeatCount="indefinite" values="0.1;0.6;0.1" />
  </circle>
  <circle cx="480" cy="30" r="2.5" fill="url(#particle)">
    <animate attributeName="cy" dur="6s" repeatCount="indefinite" values="30;20;30" />
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0.3;0.9;0.3" />
  </circle>

  <!-- Glowing Username -->
  <g text-anchor="middle" dominant-baseline="middle" font-family="Arial, Helvetica, sans-serif" letter-spacing="6">
    <text x="500" y="82" font-size="36" font-weight="bold" fill="#00d4ff" opacity="0.3" filter="blur(4px)">bobberdolle1</text>
    <text x="500" y="80" font-size="36" font-weight="bold" fill="#ffffff" opacity="0.9">bobberdolle1</text>
  </g>
</svg>
