<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="100%">
  <!-- Deep Dark Space Background -->
  <rect width="100%" height="100%" fill="#000000" />
  
  <defs>
    <!-- Cyan/Blue Wave Gradient -->
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001829" />
      <stop offset="35%" stop-color="#005f9e" />
      <stop offset="50%" stop-color="#00d4ff" />
      <stop offset="65%" stop-color="#005f9e" />
      <stop offset="100%" stop-color="#001829" />
    </linearGradient>
    
    <!-- Purple/Amethyst Wave Gradient -->
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#12001c" />
      <stop offset="35%" stop-color="#4c007a" />
      <stop offset="50%" stop-color="#9d00ff" />
      <stop offset="65%" stop-color="#4c007a" />
      <stop offset="100%" stop-color="#12001c" />
    </linearGradient>
    
    <!-- Ambient Dust Particles -->
    <radialGradient id="particle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Flowing XMB Wave 1 -->
  <path fill="none" stroke="url(#gradient1)" stroke-width="3" opacity="0.6">
    <animate attributeName="d" 
             dur="12s" 
             repeatCount="indefinite"
             values="
               M0,125 Q250,30 500,125 T1000,125;
               M0,125 Q250,220 500,125 T1000,125;
               M0,125 Q250,30 500,125 T1000,125
             " />
  </path>
  
  <!-- Flowing XMB Wave 2 (Slow & Deep) -->
  <path fill="none" stroke="url(#gradient2)" stroke-width="2" opacity="0.4">
    <animate attributeName="d" 
             dur="18s" 
             repeatCount="indefinite"
             values="
               M0,125 Q250,220 500,125 T1000,125;
               M0,125 Q250,30 500,125 T1000,125;
               M0,125 Q250,220 500,125 T1000,125
             " />
  </path>

  <!-- Flowing XMB Wave 3 (Thin Accent) -->
  <path fill="none" stroke="#ffffff" stroke-width="0.75" opacity="0.2">
    <animate attributeName="d" 
             dur="15s" 
             repeatCount="indefinite"
             values="
               M0,125 Q150,80 500,110 T1000,135;
               M0,125 Q150,170 500,140 T1000,115;
               M0,125 Q150,80 500,110 T1000,135
             " />
  </path>

  <!-- PS2 / PS3 Dust Particles (Ambient floating) -->
  <circle cx="200" cy="80" r="2" fill="url(#particle)">
    <animate attributeName="cy" dur="8s" repeatCount="indefinite" values="80;75;80" />
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0.2;0.8;0.2" />
  </circle>
  <circle cx="750" cy="160" r="1.5" fill="url(#particle)">
    <animate attributeName="cy" dur="11s" repeatCount="indefinite" values="160;165;160" />
    <animate attributeName="opacity" dur="11s" repeatCount="indefinite" values="0.1;0.6;0.1" />
  </circle>
  <circle cx="480" cy="50" r="2.5" fill="url(#particle)">
    <animate attributeName="cy" dur="6s" repeatCount="indefinite" values="50;40;50" />
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0.3;0.9;0.3" />
  </circle>

  <!-- Central Brand Typography (Futuristic, Spaced) -->
  <text x="50%" y="125" dominant-baseline="middle" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="36" font-weight="800" fill="#ffffff" letter-spacing="12" opacity="0.95">
    BOBBERDOLLE1
  </text>
</svg>
