<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="100%">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#10101e" stroke-width="0.5" />
      <path d="M 40 20 L 0 20" fill="none" stroke="#10101e" stroke-width="0.2" opacity="0.5" />
      <path d="M 20 40 L 20 0" fill="none" stroke="#10101e" stroke-width="0.2" opacity="0.5" />
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#000000" stroke-width="1.5" opacity="0.4" />
    </pattern>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#050508" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <g font-family="'Courier New', Courier, monospace" text-anchor="middle">
    <text x="500" y="50" font-size="16" font-weight="bold" fill="#ffffff">[ CONNECT WITH THE NETWORK ]</text>
    <a href="https://t.me/norevived" target="_blank">
      <rect x="350" y="80" width="140" height="40" rx="4" fill="#0b0b14" stroke="#00f0ff" stroke-width="1" />
      <text x="420" y="105" font-size="14" font-weight="bold" fill="#00f0ff">TELEGRAM</text>
    </a>
    <rect x="510" y="80" width="140" height="40" rx="4" fill="#0b0b14" stroke="#ff007f" stroke-width="1" />
    <text x="580" y="105" font-size="14" font-weight="bold" fill="#ff007f">DC: bobberdolle1</text>
  </g>
  <rect width="100%" height="100%" fill="url(#scanlines)" pointer-events="none" />
</svg>